const { useState, useEffect, useRef } = React;

const ThumbsDown = (p) => <Icon {...p}><path d="M17 14V2"/><path d="M9 18.12 10 14H4.17a2 2 0 0 1-1.92-2.56l2.33-8A2 2 0 0 1 6.5 2H17v12l-4.3 9.46A.5.5 0 0 1 12 23.72a2.76 2.76 0 0 1-3-2.72z"/></Icon>;

const BookOpen = (p) => <Icon {...p}><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></Icon>;

// ====================== CONFIG ======================
const STORAGE_KEY = 'rolla-tracker-v4';

const CATEGORIES = {
  aim: {
    label: 'AIM TRAINING',
    subtitle: 'mechanical foundation',
    accent: '#14E1A0',
    accentDim: 'rgba(20, 225, 160, 0.12)',
    hsGroup: null,
    ratingGroup: 'aim',
    items: [
      { key: 'aimlabs', label: 'Aimlabs', hint: '15 min minimum', min: 3, stretch: 5, prompt: 'rating' },
    ]
  },
  practice: {
    label: 'IN-GAME PRACTICE',
    subtitle: 'reps + unwind',
    accent: '#FFB86C',
    accentDim: 'rgba(255, 184, 108, 0.12)',
    hsGroup: 'practice',
    ratingGroup: null,
    items: [
      { key: 'dm', label: 'Deathmatch', min: 5, stretch: 8, prompt: null },
      { key: 'tdm', label: 'TDM', min: 3, stretch: 5, prompt: 'hs' },
      { key: 'knockout', label: 'Knockout', min: 2, stretch: 4, prompt: 'hs' },
    ]
  },
  game: {
    label: 'GAME TIME',
    subtitle: 'the real thing',
    accent: '#FF4655',
    accentDim: 'rgba(255, 70, 85, 0.12)',
    hsGroup: 'game',
    ratingGroup: null,
    items: [
      { key: 'swift', label: 'Swiftplay', min: 4, stretch: 6, prompt: 'hs' },
      { key: 'comp', label: 'Competitive', min: 2, stretch: 3, prompt: 'hs' },
    ]
  },
};

const ALL_ITEMS = Object.values(CATEGORIES).flatMap(c => c.items);
const ITEM_LABELS = ALL_ITEMS.reduce((acc, i) => ({ ...acc, [i.key]: i.label }), {});
const PRACTICE_KEYS = ['dm', 'tdm', 'knockout'];
const GAME_KEYS = ['swift', 'comp'];

// ====================== DATE HELPERS ======================
function getMondayOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d.setDate(diff));
  monday.setHours(0, 0, 0, 0);
  return toDateString(monday);
}
function toDateString(d) { return d.toISOString().split('T')[0]; }
function getTodayDateString() { const d = new Date(); d.setHours(0,0,0,0); return toDateString(d); }
function addDays(dateStr, days) { const d = new Date(dateStr); d.setDate(d.getDate() + days); return toDateString(d); }
function daysBetween(a, b) { return Math.floor(Math.abs(new Date(b) - new Date(a)) / 86400000); }
function daysInWeek(start) { return Array.from({ length: 7 }, (_, i) => addDays(start, i)); }

function formatDayLabel(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.toLocaleString('en', { weekday: 'short' }).toUpperCase();
  const month = d.toLocaleString('en', { month: 'short' }).toUpperCase();
  return `${day} · ${month} ${d.getDate()}`;
}
function formatShortDay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleString('en', { weekday: 'narrow' });
}
function formatWeekLabel(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return `WK OF ${d.toLocaleString('en', { month: 'short' }).toUpperCase()} ${d.getDate()}`;
}

// ====================== STATE HELPERS ======================
function emptyCounts() { return ALL_ITEMS.reduce((a, i) => ({ ...a, [i.key]: 0 }), {}); }
function emptyDayLog() { return { counts: emptyCounts(), practiceHS: [], gameHS: [], aimRatings: [] }; }
function getDayLog(dailyLogs, dateStr) { return dailyLogs[dateStr] || emptyDayLog(); }

function computeWeeklyTotals(dailyLogs, weekStart) {
  const days = daysInWeek(weekStart);
  const counts = emptyCounts();
  let practiceHS = [], gameHS = [], aimRatings = [];
  days.forEach(d => {
    const log = dailyLogs[d];
    if (!log) return;
    ALL_ITEMS.forEach(item => { counts[item.key] += (log.counts[item.key] || 0); });
    practiceHS = practiceHS.concat(log.practiceHS || []);
    gameHS = gameHS.concat(log.gameHS || []);
    aimRatings = aimRatings.concat(log.aimRatings || []);
  });
  return { counts, practiceHS, gameHS, aimRatings };
}

function hitAllMinimums(counts) { return ALL_ITEMS.every(i => (counts[i.key] || 0) >= i.min); }
function hitAllStretch(counts) { return ALL_ITEMS.every(i => (counts[i.key] || 0) >= i.stretch); }

function totalProgress(counts) {
  const totalMin = ALL_ITEMS.reduce((s, i) => s + i.min, 0);
  const current = ALL_ITEMS.reduce((s, i) => s + Math.min(counts[i.key] || 0, i.min), 0);
  return Math.round((current / totalMin) * 100);
}

function avg(arr) { return arr.length ? arr.reduce((s, v) => s + v, 0) / arr.length : null; }

function dayHasActivity(dayLog) {
  if (!dayLog) return false;
  return ALL_ITEMS.some(item => (dayLog.counts[item.key] || 0) > 0);
}

function getAllActivityDates(state) {
  const dates = new Set();
  Object.entries(state.currentWeek.dailyLogs).forEach(([date, log]) => {
    if (dayHasActivity(log)) dates.add(date);
  });
  state.history.forEach(week => {
    Object.entries(week.dailyLogs || {}).forEach(([date, log]) => {
      if (dayHasActivity(log)) dates.add(date);
    });
  });
  return dates;
}

function computeDayStreak(activityDates) {
  const today = getTodayDateString();
  const yesterday = addDays(today, -1);
  if (!activityDates.has(today) && !activityDates.has(yesterday)) return 0;
  let cursor = activityDates.has(today) ? today : yesterday;
  let streak = 0;
  while (activityDates.has(cursor)) { streak++; cursor = addDays(cursor, -1); }
  return streak;
}

function computeLongestDayStreak(activityDates) {
  if (activityDates.size === 0) return 0;
  const sorted = [...activityDates].sort();
  let longest = 1, current = 1;
  for (let i = 1; i < sorted.length; i++) {
    if (daysBetween(sorted[i - 1], sorted[i]) === 1) { current++; longest = Math.max(longest, current); }
    else current = 1;
  }
  return longest;
}

const defaultState = () => ({
  currentWeek: { startDate: getMondayOfWeek(new Date()), dailyLogs: {}, journal: '', tags: [] },
  history: [],
  streaks: { longestDayStreak: 0, currentWeekStreak: 0, longestWeekStreak: 0, totalSessionsLogged: 0 }
});

function handleWeekRollover(s) {
  const currentMonday = getMondayOfWeek(new Date());
  if (s.currentWeek.startDate === currentMonday) return s;
  const weekly = computeWeeklyTotals(s.currentWeek.dailyLogs, s.currentWeek.startDate);
  const archived = {
    weekStart: s.currentWeek.startDate,
    dailyLogs: s.currentWeek.dailyLogs,
    journal: s.currentWeek.journal,
    tags: s.currentWeek.tags,
    hitMinimum: hitAllMinimums(weekly.counts),
    hitStretch: hitAllStretch(weekly.counts),
  };
  let newWeekStreak = s.streaks.currentWeekStreak;
  if (archived.hitMinimum) newWeekStreak += 1; else newWeekStreak = 0;
  return {
    currentWeek: { startDate: currentMonday, dailyLogs: {}, journal: '', tags: [] },
    history: [archived, ...s.history].slice(0, 52),
    streaks: { ...s.streaks, currentWeekStreak: newWeekStreak, longestWeekStreak: Math.max(s.streaks.longestWeekStreak, newWeekStreak) }
  };
}

// ====================== MAIN COMPONENT ======================
function RollaTracker() {
  const [state, setState] = useState(null);
  const [loading, setLoading] = useState(true);
  const [selectedDay, setSelectedDay] = useState(getTodayDateString());
  const [expandedHistory, setExpandedHistory] = useState(false);
  const [celebration, setCelebration] = useState(null);
  const [pendingPrompt, setPendingPrompt] = useState(null);
  const [hsInput, setHsInput] = useState('');
  const [newTagInput, setNewTagInput] = useState('');
  const [showTagInput, setShowTagInput] = useState(false);
  const [showDataMenu, setShowDataMenu] = useState(false);
  const previousMinHitRef = useRef(false);

  // Load from localStorage
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        const rolled = handleWeekRollover(parsed);
        setState(rolled);
        if (rolled !== parsed) localStorage.setItem(STORAGE_KEY, JSON.stringify(rolled));
        const weekly = computeWeeklyTotals(rolled.currentWeek.dailyLogs, rolled.currentWeek.startDate);
        previousMinHitRef.current = hitAllMinimums(weekly.counts);
      } else {
        setState(defaultState());
      }
    } catch (e) {
      console.error('load error', e);
      setState(defaultState());
    }
    setLoading(false);
  }, []);

  // Save to localStorage
  useEffect(() => {
    if (!state || loading) return;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch (e) { console.error('save failed', e); }
  }, [state, loading]);

  function increment(itemKey, delta = 1) {
    setState(prev => {
      const targetDay = selectedDay;
      const currentDayLog = getDayLog(prev.currentWeek.dailyLogs, targetDay);
      const currentCount = currentDayLog.counts[itemKey] || 0;
      const newCount = Math.max(0, currentCount + delta);
      if (delta < 0 && currentCount === 0) return prev;

      const newDayLog = {
        counts: { ...currentDayLog.counts, [itemKey]: newCount },
        practiceHS: [...currentDayLog.practiceHS],
        gameHS: [...currentDayLog.gameHS],
        aimRatings: [...currentDayLog.aimRatings],
      };

      if (delta < 0) {
        if (PRACTICE_KEYS.includes(itemKey)) {
          const idx = [...newDayLog.practiceHS].reverse().findIndex(e => e.mode === itemKey);
          if (idx >= 0) newDayLog.practiceHS.splice(newDayLog.practiceHS.length - 1 - idx, 1);
        } else if (GAME_KEYS.includes(itemKey)) {
          const idx = [...newDayLog.gameHS].reverse().findIndex(e => e.mode === itemKey);
          if (idx >= 0) newDayLog.gameHS.splice(newDayLog.gameHS.length - 1 - idx, 1);
        } else if (itemKey === 'aimlabs') {
          if (newDayLog.aimRatings.length > 0) newDayLog.aimRatings.pop();
        }
      }

      const newDailyLogs = { ...prev.currentWeek.dailyLogs, [targetDay]: newDayLog };
      const weekly = computeWeeklyTotals(newDailyLogs, prev.currentWeek.startDate);

      let newStreaks = { ...prev.streaks };
      if (delta > 0) newStreaks.totalSessionsLogged += 1;

      const tempState = { ...prev, currentWeek: { ...prev.currentWeek, dailyLogs: newDailyLogs } };
      const activityDates = getAllActivityDates(tempState);
      const longest = computeLongestDayStreak(activityDates);
      newStreaks.longestDayStreak = Math.max(newStreaks.longestDayStreak, longest);

      const nowHit = hitAllMinimums(weekly.counts);
      if (nowHit && !previousMinHitRef.current && delta > 0) {
        setCelebration('MINIMUMS CLEARED — WEEK LOCKED IN');
        setTimeout(() => setCelebration(null), 4000);
      }
      const prevWeekly = computeWeeklyTotals(prev.currentWeek.dailyLogs, prev.currentWeek.startDate);
      const nowStretch = hitAllStretch(weekly.counts);
      if (nowStretch && !hitAllStretch(prevWeekly.counts) && delta > 0) {
        setCelebration('ALL STRETCH GOALS HIT — ABSOLUTE UNIT');
        setTimeout(() => setCelebration(null), 4000);
      }
      previousMinHitRef.current = nowHit;

      if (delta > 0) {
        const item = ALL_ITEMS.find(i => i.key === itemKey);
        if (item?.prompt) {
          setPendingPrompt({ itemKey, type: item.prompt, day: targetDay });
          setHsInput('');
        }
      }

      return { ...prev, currentWeek: { ...prev.currentWeek, dailyLogs: newDailyLogs }, streaks: newStreaks };
    });
  }

  function submitHS() {
    const val = parseFloat(hsInput);
    if (isNaN(val) || val < 0 || val > 100 || !pendingPrompt) return;
    const { itemKey, day } = pendingPrompt;
    const entry = { value: val, mode: itemKey, date: new Date().toISOString() };
    setState(prev => {
      const dayLog = getDayLog(prev.currentWeek.dailyLogs, day);
      const newDayLog = { ...dayLog };
      if (PRACTICE_KEYS.includes(itemKey)) newDayLog.practiceHS = [...dayLog.practiceHS, entry];
      else if (GAME_KEYS.includes(itemKey)) newDayLog.gameHS = [...dayLog.gameHS, entry];
      return { ...prev, currentWeek: { ...prev.currentWeek, dailyLogs: { ...prev.currentWeek.dailyLogs, [day]: newDayLog } } };
    });
    setPendingPrompt(null);
    setHsInput('');
  }

  function submitRating(rating) {
    if (!pendingPrompt) return;
    const { day } = pendingPrompt;
    const entry = { rating, date: new Date().toISOString() };
    setState(prev => {
      const dayLog = getDayLog(prev.currentWeek.dailyLogs, day);
      const newDayLog = { ...dayLog, aimRatings: [...dayLog.aimRatings, entry] };
      return { ...prev, currentWeek: { ...prev.currentWeek, dailyLogs: { ...prev.currentWeek.dailyLogs, [day]: newDayLog } } };
    });
    setPendingPrompt(null);
  }

  function skipPrompt() { setPendingPrompt(null); setHsInput(''); }
  function updateJournal(text) { setState(prev => ({ ...prev, currentWeek: { ...prev.currentWeek, journal: text } })); }

  function addTag(tag) {
    const trimmed = tag.trim();
    if (!trimmed) return;
    setState(prev => {
      if (prev.currentWeek.tags.includes(trimmed)) return prev;
      return { ...prev, currentWeek: { ...prev.currentWeek, tags: [...prev.currentWeek.tags, trimmed] } };
    });
    setNewTagInput('');
    setShowTagInput(false);
  }

  function removeTag(tag) {
    setState(prev => ({ ...prev, currentWeek: { ...prev.currentWeek, tags: prev.currentWeek.tags.filter(t => t !== tag) } }));
  }

  function exportData() {
    const dataStr = JSON.stringify(state, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `combat-log-backup-${getTodayDateString()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setShowDataMenu(false);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const imported = JSON.parse(evt.target.result);
        if (!imported.currentWeek || !imported.streaks) throw new Error('Invalid backup file');
        if (confirm('This will replace all current data. Continue?')) {
          const rolled = handleWeekRollover(imported);
          setState(rolled);
          setShowDataMenu(false);
          alert('Data imported successfully.');
        }
      } catch (err) {
        alert('Could not import: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  if (loading || !state) return <div className="loading-screen">LOADING...</div>;

  const today = getTodayDateString();
  const weekStart = state.currentWeek.startDate;
  const weeklyTotals = computeWeeklyTotals(state.currentWeek.dailyLogs, weekStart);
  const selectedDayLog = getDayLog(state.currentWeek.dailyLogs, selectedDay);
  const progress = totalProgress(weeklyTotals.counts);
  const minHit = hitAllMinimums(weeklyTotals.counts);
  const stretchHit = hitAllStretch(weeklyTotals.counts);
  const weekLabel = formatWeekLabel(weekStart);
  const practiceHSAvg = avg(weeklyTotals.practiceHS.map(e => e.value));
  const gameHSAvg = avg(weeklyTotals.gameHS.map(e => e.value));
  const thumbsUp = weeklyTotals.aimRatings.filter(r => r.rating === 'up').length;
  const thumbsDown = weeklyTotals.aimRatings.filter(r => r.rating === 'down').length;
  const activityDates = getAllActivityDates(state);
  const currentDayStreak = computeDayStreak(activityDates);
  const insights = computeInsights(state);
  const weekDays = daysInWeek(weekStart);
  const selectedIsToday = selectedDay === today;
  const canGoBack = selectedDay > weekStart;
  const canGoForward = selectedDay < today && selectedDay < weekDays[6];

  return (
    <div style={styles.container} className="tracker-scroll">
      <div style={styles.scanlines} />

      {celebration && (
        <div style={styles.celebration}>
          <Sparkles size={18} style={{ marginRight: 8 }} />
          {celebration}
        </div>
      )}

function DaySelector({ selectedDay, setSelectedDay, weekDays, today, dailyLogs, canGoBack, canGoForward, selectedIsToday }) {
  function navigate(dir) {
    const newDay = addDays(selectedDay, dir);
    if (dir > 0 && (newDay > today || newDay > weekDays[6])) return;
    if (dir < 0 && newDay < weekDays[0]) return;
    setSelectedDay(newDay);
  }
  return (
    <div style={styles.daySelector}>
      <div style={styles.dayNav}>
        <button onClick={() => navigate(-1)} disabled={!canGoBack}
          style={{ ...styles.dayArrow, opacity: canGoBack ? 1 : 0.3, cursor: canGoBack ? 'pointer' : 'not-allowed' }}>
          <ChevronLeft size={20} />
        </button>
        <div style={styles.dayLabel}>
          <div style={styles.dayLabelMain}>{formatDayLabel(selectedDay)}</div>
          {selectedIsToday && <div style={styles.todayBadge}>● TODAY</div>}
          {!selectedIsToday && <div style={styles.pastBadge}>backtrack mode</div>}
        </div>
        <button onClick={() => navigate(1)} disabled={!canGoForward}
          style={{ ...styles.dayArrow, opacity: canGoForward ? 1 : 0.3, cursor: canGoForward ? 'pointer' : 'not-allowed' }}>
          <ChevronRight size={20} />
        </button>
      </div>
      <div style={styles.dayDots}>
        {weekDays.map(day => {
          const isFuture = day > today;
          const isSelected = day === selectedDay;
          const hasActivity = dayHasActivity(dailyLogs[day]);
          const isToday = day === today;
          return (
            <button key={day} onClick={() => !isFuture && setSelectedDay(day)} disabled={isFuture}
              style={{ ...styles.dayDot,
                background: isSelected ? '#14E1A0' : isToday && !isSelected ? '#1a2330' : 'transparent',
                borderColor: isSelected ? '#14E1A0' : isToday ? '#14E1A040' : '#21262d',
                color: isSelected ? '#0a0e14' : isFuture ? '#2d333b' : hasActivity ? '#E6EDF3' : '#6E7681',
                cursor: isFuture ? 'not-allowed' : 'pointer',
                fontWeight: isSelected || isToday ? 700 : 500 }}>
              <span style={{ fontSize: 10, letterSpacing: '0.1em' }}>{formatShortDay(day)}</span>
              {hasActivity && !isSelected && <span style={{ width: 3, height: 3, background: '#14E1A0', borderRadius: '50%', display: 'block', marginTop: 3 }} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function computeInsights(state) {
  const allDayLogs = [];
  Object.values(state.currentWeek.dailyLogs || {}).forEach(log => allDayLogs.push(log));
  state.history.forEach(week => { Object.values(week.dailyLogs || {}).forEach(log => allDayLogs.push(log)); });
  const ratings = allDayLogs.flatMap(l => l.aimRatings || []);
  const practiceHS = allDayLogs.flatMap(l => l.practiceHS || []);
  const gameHS = allDayLogs.flatMap(l => l.gameHS || []);
  if (ratings.length < 2) return null;
  const goodDays = new Set(ratings.filter(r => r.rating === 'up').map(r => r.date.split('T')[0]));
  const offDays = new Set(ratings.filter(r => r.rating === 'down').map(r => r.date.split('T')[0]));
  const goodPracticeHS = practiceHS.filter(e => goodDays.has(e.date.split('T')[0])).map(e => e.value);
  const offPracticeHS = practiceHS.filter(e => offDays.has(e.date.split('T')[0])).map(e => e.value);
  const goodGameHS = gameHS.filter(e => goodDays.has(e.date.split('T')[0])).map(e => e.value);
  const offGameHS = gameHS.filter(e => offDays.has(e.date.split('T')[0])).map(e => e.value);
  if ((goodPracticeHS.length + goodGameHS.length + offPracticeHS.length + offGameHS.length) === 0) return null;
  return {
    good: { practiceAvg: avg(goodPracticeHS), gameAvg: avg(goodGameHS), practiceN: goodPracticeHS.length, gameN: goodGameHS.length },
    off: { practiceAvg: avg(offPracticeHS), gameAvg: avg(offGameHS), practiceN: offPracticeHS.length, gameN: offGameHS.length }
  };
}

function HistoryItem({ week }) {
  const [expanded, setExpanded] = useState(false);
  const weekly = week.dailyLogs ? computeWeeklyTotals(week.dailyLogs, week.weekStart) : null;
  const practiceAvg = weekly ? avg(weekly.practiceHS.map(e => e.value)) : null;
  const gameAvg = weekly ? avg(weekly.gameHS.map(e => e.value)) : null;
  const hasJournal = week.journal && week.journal.trim().length > 0;
  const hasTags = week.tags && week.tags.length > 0;
  const canExpand = hasJournal || hasTags;
  return (
    <div style={styles.historyItem}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: canExpand ? 'pointer' : 'default' }}
        onClick={() => canExpand && setExpanded(!expanded)}>
        <div style={{ flex: 1 }}>
          <div style={styles.historyWeek}>
            {formatWeekLabel(week.weekStart)}
            {canExpand && <span style={{ color: '#6E7681', marginLeft: 8, fontSize: 10 }}>{expanded ? '▼' : '▶'}</span>}
          </div>
          {(practiceAvg !== null || gameAvg !== null) && (
            <div style={styles.historyHS}>
              {practiceAvg !== null && <span>P: {practiceAvg.toFixed(1)}%</span>}
              {practiceAvg !== null && gameAvg !== null && <span style={{ color: '#484F58' }}> · </span>}
              {gameAvg !== null && <span>G: {gameAvg.toFixed(1)}%</span>}
            </div>
          )}
        </div>
        <div style={styles.historyStatus}>
          {week.hitStretch ? <span style={{ color: '#14E1A0' }}>● STRETCH</span>
            : week.hitMinimum ? <span style={{ color: '#14E1A0' }}>● MIN HIT</span>
            : <span style={{ color: '#FF4655' }}>○ MISSED</span>}
        </div>
      </div>
      {expanded && canExpand && (
        <div style={styles.historyExpanded}>
          {hasTags && (
            <div style={{ marginBottom: hasJournal ? 10 : 0 }}>
              <div style={styles.historySectionLabel}>CONTEXT</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginTop: 4 }}>
                {week.tags.map((t, i) => <div key={i} style={styles.historyTag}>{t}</div>)}
              </div>
            </div>
          )}
          {hasJournal && (
            <div>
              <div style={styles.historySectionLabel}>JOURNAL</div>
              <div style={styles.historyJournal}>{week.journal}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
